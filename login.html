<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<meta name="theme-color" content="#008f4c"/>
<title>ValeMove · Otimização de Rotas — Porto Ponta da Madeira</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<!-- Tailwind + Lucide + Leaflet (apenas para ocorrências geolocalizadas) -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          vale: {
            green:      '#008f4c',
            'green-dk': '#00683a',
            'green-lt': '#10a861',
            'green-bg': '#e6f4ec',
            yellow:     '#fdb913',
            'yellow-dk':'#e0a000',
            'yellow-bg':'#fff6df',
            ink:        '#0e1a14',
            'ink-2':    '#1d2d24',
            slate:      '#f4f6f5',
            border:     '#dbe1dd',
          }
        },
        fontFamily: {
          sans: ['Inter','system-ui','sans-serif'],
          mono: ['JetBrains Mono','ui-monospace','monospace'],
        },
        boxShadow: {
          card:  '0 1px 2px rgba(0,0,0,.04), 0 4px 16px -4px rgba(0,0,0,.06)',
          pop:   '0 8px 32px -8px rgba(0,0,0,.18)',
          inset: 'inset 0 1px 0 rgba(255,255,255,.06)',
        }
      }
    }
  }
</script>

<style>
  :root {
    --v-green:    #008f4c;
    --v-green-dk: #00683a;
    --v-green-lt: #10a861;
    --v-yellow:   #fdb913;
    --v-yellow-dk:#e0a000;
    --v-ink:      #0e1a14;
    --v-slate:    #f4f6f5;
    --v-border:   #dbe1dd;
  }

  * { -webkit-tap-highlight-color: transparent; }
  html, body { font-family: 'Inter', system-ui, sans-serif; }
  body {
    background: var(--v-slate);
    color: var(--v-ink);
    font-size: 14px;
    line-height: 1.5;
    overflow-x: hidden;
    min-height: 100vh;
    min-height: 100dvh;
  }
  .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .tabular-nums { font-variant-numeric: tabular-nums; }

  /* ========= LOGO VALEMOVE (oficial) ========= */
  .vm-logo { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .vm-logo svg { width: 100%; height: 100%; display: block; }

  /* Legado: logo Vale rotacionada (mantida por compat) */
  .vale-logo {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .vale-logo::before {
    content: '';
    position: absolute;
    inset: 0;
    transform: rotate(45deg);
    border-radius: 4px;
    background: linear-gradient(135deg, var(--v-green) 0%, var(--v-green) 50%, var(--v-yellow) 50%, var(--v-yellow) 100%);
  }
  .vale-logo > span {
    position: relative;
    color: #fff;
    font-weight: 800;
    letter-spacing: 0.14em;
    font-family: 'Inter', sans-serif;
  }

  /* ========= ANIMAÇÕES ========= */
  .pulse-dot { position: relative; }
  .pulse-dot::before {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 9999px;
    background: currentColor;
    opacity: .35;
    animation: pulse 1.6s ease-out infinite;
  }
  @keyframes pulse {
    0%   { transform: scale(.6); opacity: .55; }
    100% { transform: scale(1.9); opacity: 0;   }
  }

  .blink { animation: blink 1.1s steps(2,start) infinite; }
  @keyframes blink { to { visibility: hidden; } }

  .scrollbar-thin::-webkit-scrollbar      { width: 6px; height: 6px; }
  .scrollbar-thin::-webkit-scrollbar-thumb{ background: #cfd6d2; border-radius: 9999px; }

  /* Mapa operacional — traços de via */
  .road        { stroke: #b8c1bc; stroke-width: 6; fill: none; stroke-linecap: round; }
  .road-main   { stroke: #95a099; stroke-width: 10; }
  .road-interdicted {
    stroke: #dc2626; stroke-width: 7;
    stroke-dasharray: 8 6; stroke-linecap: round;
    fill: none;
  }
  .route-live  {
    stroke: var(--v-yellow); stroke-width: 3.5; fill: none;
    stroke-dasharray: 6 6; stroke-linecap: round;
    animation: dash 1.2s linear infinite;
    filter: drop-shadow(0 0 5px rgba(253,185,19,.65));
  }
  .route-done { stroke: var(--v-green); stroke-width: 3; fill: none; }
  @keyframes dash { to { stroke-dashoffset: -24; } }

  /* Chip util */
  .chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 9999px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.01em;
    white-space: nowrap;
  }

  .modal-bd { background: rgba(14,26,20,.6); backdrop-filter: blur(4px); }

  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }

  /* ========= LOGIN ========= */
  #screen-login {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(ellipse 80% 60% at 20% 25%, rgba(16,168,97,0.14) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 85% 75%, rgba(253,185,19,0.10) 0%, transparent 60%),
      linear-gradient(135deg, #05110c 0%, #0e1a14 50%, #05110c 100%);
  }
  #screen-login::after {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: radial-gradient(circle at center, rgba(0,0,0,.9) 30%, transparent 75%);
  }
  .login-card {
    position: relative; z-index: 1;
    width: 100%; max-width: 420px;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 32px;
  }
  .login-input {
    width: 100%; padding: 11px 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    color: #fff; font-size: 14px;
    outline: none; transition: border-color .15s, background .15s;
  }
  .login-input:focus { border-color: var(--v-green-lt); background: rgba(255,255,255,0.08); }
  .login-input::placeholder { color: rgba(255,255,255,0.3); }
  .login-tab {
    flex: 1; padding: 8px 10px; border: none;
    background: transparent; color: rgba(255,255,255,0.5);
    font-size: 12px; font-weight: 500;
    border-radius: 7px; cursor: pointer;
    transition: all .15s; letter-spacing: 0.02em;
  }
  .login-tab.active { background: var(--v-green); color: #fff; }

  .rfid-zone {
    border: 2px dashed rgba(255,255,255,0.18);
    border-radius: 14px;
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
  }
  .rfid-zone:hover { border-color: var(--v-green-lt); background: rgba(16,168,97,0.08); }
  .rfid-zone.reading { border-color: var(--v-green-lt); animation: rfid-pulse 1s ease infinite; }
  @keyframes rfid-pulse { 0%,100%{opacity:1;} 50%{opacity:0.55;} }

  .demo-btn {
    display: flex; align-items: center; gap: 10px; width: 100%;
    padding: 9px 12px; background: transparent;
    border: 1px solid transparent; border-radius: 8px;
    color: rgba(255,255,255,0.6); font-size: 12px;
    cursor: pointer; transition: all .12s;
    margin-bottom: 4px;
    text-align: left;
  }
  .demo-btn:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.12); color: #fff; }

  .role-pill {
    padding: 2px 8px; border-radius: 4px;
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.08em;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
  }
  .rp-mot    { background: rgba(16,168,97,0.22);  color:#7ee8a7; }
  .rp-campo  { background: rgba(253,185,19,0.22); color:#fde27a; }
  .rp-desp   { background: rgba(99,217,238,0.22); color:#9ae4f0; }

  /* ========= APP SHELL ========= */
  #screen-app { display: none; }
  #screen-app.visible { display: block; }

  .app-shell {
    display: grid;
    grid-template-rows: auto 1fr auto;
    min-height: 100vh;
    min-height: 100dvh;
  }
  @media (min-width: 1024px) {
    .app-shell {
      grid-template-columns: 240px 1fr;
      grid-template-rows: auto 1fr;
      grid-template-areas:
        "sidebar topbar"
        "sidebar content";
    }
    .topbar  { grid-area: topbar; }
    .sidebar { grid-area: sidebar; display: flex !important; }
    .content { grid-area: content; }
    .bottom-nav { display: none !important; }
  }

  /* ========= SIDEBAR (DESKTOP) ========= */
  .sidebar {
    display: none;
    flex-direction: column;
    background: #0e1a14;
    color: rgba(255,255,255,0.75);
    min-height: 100vh;
    min-height: 100dvh;
    position: sticky;
    top: 0;
    border-right: 1px solid rgba(255,255,255,0.05);
  }
  .sb-nav-item {
    display: flex; align-items: center; gap: 11px;
    padding: 10px 12px; margin: 1px 0;
    border-radius: 10px;
    color: rgba(255,255,255,0.55);
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: all .12s;
    border: 1px solid transparent;
    background: transparent;
    width: 100%;
    text-align: left;
  }
  .sb-nav-item:hover { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.92); }
  .sb-nav-item.active {
    background: rgba(16,168,97,0.14);
    border-color: rgba(16,168,97,0.3);
    color: #c5f0d6;
  }
  .sb-nav-item.active svg { color: var(--v-green-lt); }

  /* ========= BOTTOM NAV (MOBILE) ========= */
  .bottom-nav {
    display: grid;
    position: sticky;
    bottom: 0;
    background: #fff;
    border-top: 1px solid var(--v-border);
    box-shadow: 0 -4px 16px -8px rgba(0,0,0,0.08);
    z-index: 40;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
  }
  .content {
    padding-bottom: calc(70px + env(safe-area-inset-bottom));
  }
  .bn-item {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 8px 6px; background: transparent; border: none;
    color: #7a8580; font-size: 10px; font-weight: 600;
    cursor: pointer; transition: color .15s;
  }
  .bn-item.active { color: var(--v-green); }
  .bn-item svg { width: 20px; height: 20px; }

  .mobile-profile { position: relative; }
  .mobile-profile-menu {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    min-width: 220px;
    background: #fff;
    border: 1px solid var(--v-border);
    border-radius: 16px;
    box-shadow: 0 18px 40px -24px rgba(14,26,20,0.4);
    padding: 8px;
    z-index: 60;
  }
  .mobile-profile-menu.hidden { display: none; }
  .mobile-profile-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px;
    border-bottom: 1px solid var(--v-border);
    margin-bottom: 6px;
  }
  .mobile-profile-avatar {
    width: 36px;
    height: 36px;
    border-radius: 999px;
    background: var(--v-green);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .mobile-profile-btn {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    border: none;
    background: transparent;
    border-radius: 12px;
    padding: 10px 12px;
    color: #b91c1c;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
  }
  .mobile-profile-btn:hover { background: #fef2f2; }

  /* ========= TOPBAR ========= */
  .topbar {
    position: sticky; top: 0; z-index: 30;
    background: #fff;
    border-bottom: 1px solid var(--v-border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* ========= TOASTS ========= */
  #toasts {
    position: fixed; bottom: 72px; right: 16px; left: 16px;
    z-index: 9999; display: flex; flex-direction: column; gap: 8px;
    pointer-events: none;
  }
  @media (min-width: 640px) {
    #toasts { left: auto; max-width: 360px; }
  }
  @media (min-width: 1024px) {
    #toasts { bottom: 24px; }
  }
  .toast {
    pointer-events: auto;
    display: flex; align-items: flex-start; gap: 10px;
    padding: 11px 14px;
    border-radius: 10px;
    font-size: 13px;
    box-shadow: 0 8px 28px -8px rgba(0,0,0,0.18);
    border: 1px solid;
    animation: slide-in .25s ease;
  }
  @keyframes slide-in { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
  .toast-success { background:#f0fdf4; border-color:rgba(16,168,97,0.4);  color:#166534; }
  .toast-error   { background:#fef2f2; border-color:rgba(220,38,38,0.35); color:#991b1b; }
  .toast-info    { background:#eff6ff; border-color:rgba(59,130,246,0.3); color:#1e3a8a; }
  .toast-warn    { background:#fffbeb; border-color:rgba(253,185,19,0.5); color:#854d0e; }

  /* ========= CARDS / FORM ========= */
  .card {
    background: #fff;
    border: 1px solid var(--v-border);
    border-radius: 14px;
    box-shadow: 0 1px 2px rgba(0,0,0,.03);
  }

  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 6px;
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 13px; font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    border: 1px solid transparent;
    background: transparent;
    color: var(--v-ink);
    white-space: nowrap;
  }
  .btn-primary  { background: var(--v-green); color: #fff; border-color: var(--v-green); }
  .btn-primary:hover { background: var(--v-green-dk); border-color: var(--v-green-dk); }
  .btn-yellow   { background: var(--v-yellow); color: var(--v-ink); border-color: var(--v-yellow); font-weight: 700; }
  .btn-yellow:hover { background: var(--v-yellow-dk); border-color: var(--v-yellow-dk); }
  .btn-ghost    { background: transparent; border-color: var(--v-border); color: var(--v-ink); }
  .btn-ghost:hover { background: var(--v-slate); }
  .btn-danger   { background: #fff; border-color: #fecaca; color: #b91c1c; }
  .btn-danger:hover { background: #fef2f2; }
  .btn-xl       { padding: 14px 20px; font-size: 15px; border-radius: 12px; }
  .btn-block    { width: 100%; }

  .field { margin-bottom: 12px; }
  .field label {
    display: block;
    font-size: 11px; font-weight: 600;
    color: #5a6860; text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 5px;
  }
  .field input, .field select, .field textarea {
    width: 100%; padding: 10px 12px;
    background: #fff;
    border: 1px solid var(--v-border);
    border-radius: 10px;
    color: var(--v-ink);
    font-family: inherit; font-size: 14px;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--v-green);
    box-shadow: 0 0 0 3px rgba(0,143,76,.12);
  }
  .field textarea { resize: vertical; min-height: 76px; }
  .field input[readonly] { background: var(--v-slate); color: #5a6860; }

  /* Badge status de veículo */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 9px;
    border-radius: 9999px;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.01em;
  }
  .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .bd-ok     { background: rgba(16,168,97,0.12);  color:#086a3a; }
  .bd-warn   { background: rgba(253,185,19,0.18); color:#855b0a; }
  .bd-err    { background: rgba(220,38,38,0.12);  color:#991b1b; }
  .bd-info   { background: rgba(59,130,246,0.14); color:#1e40af; }
  .bd-mute   { background: rgba(14,26,20,0.08);   color:#5a6860; }

  /* Leaflet popup custom */
  .leaflet-popup-content-wrapper {
    border-radius: 10px !important;
    box-shadow: 0 8px 24px rgba(0,0,0,.14) !important;
    font-family: 'Inter', sans-serif !important;
  }
  .leaflet-popup-content { margin: 12px 14px !important; }

  /* Mobile: panel padding */
  .content-wrap { padding: 14px; }
  @media (min-width: 1024px) { .content-wrap { padding: 20px 24px; } }

  /* Scroll fade */
  .fade-mask {
    mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
  }

  /* Big action button (mobile thumb zone) */
  .big-action {
    width: 100%;
    padding: 18px 20px;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    background: linear-gradient(135deg, var(--v-green) 0%, var(--v-green-dk) 100%);
    color: #fff;
    border: none;
    box-shadow: 0 6px 20px -6px rgba(0,143,76,0.45);
    cursor: pointer;
    transition: all .18s;
    letter-spacing: 0.01em;
  }
  .big-action:hover { transform: translateY(-1px); box-shadow: 0 10px 26px -8px rgba(0,143,76,0.5); }
  .big-action:active { transform: translateY(0); }
  .big-action.yellow {
    background: linear-gradient(135deg, var(--v-yellow) 0%, var(--v-yellow-dk) 100%);
    color: var(--v-ink);
    box-shadow: 0 6px 20px -6px rgba(253,185,19,0.5);
  }

  /* Sparkline */
  .spark path { fill: none; stroke-width: 2; }

  /* Spinner */
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,.35);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Hide scroll on specific containers but keep scroll */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; }

  /* Tile buttons for quick action (condição da via) */
  .tile-cond {
    padding: 14px 10px;
    background: #fff;
    border: 1.5px solid var(--v-border);
    border-radius: 12px;
    cursor: pointer;
    font-size: 12px; font-weight: 600;
    color: #5a6860;
    transition: all .15s;
    text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .tile-cond:hover { border-color: #9ab4a8; }
  .tile-cond.on[data-cond="liberada"] { background: rgba(16,168,97,0.08); border-color: var(--v-green); color: var(--v-green-dk); }
  .tile-cond.on[data-cond="lenta"]    { background: rgba(253,185,19,0.10); border-color: var(--v-yellow-dk); color:#7a4e07; }
  .tile-cond.on[data-cond="parcial"]  { background: rgba(255,110,0,0.08);  border-color: #ea580c; color: #9a3412; }
  .tile-cond.on[data-cond="total"]    { background: rgba(220,38,38,0.08);  border-color: #dc2626; color: #991b1b; }

  /* map legend */
  .mlg { display: flex; align-items: center; gap: 6px; font-size: 11px; color:#5a6860; }
  .mlg .d { width: 10px; height: 10px; border-radius: 9999px; }

  /* Utility classes */
  .divide-border > * + * { border-top: 1px solid var(--v-border); }

  /* Prevent text selection on buttons in mobile */
  button { user-select: none; }
</style>
</head>
<body>
<!-- ============================================================
     LOGIN
============================================================ -->
<div id="screen-login">
  <div class="login-card">
    <!-- Logo -->
    <div class="flex items-center gap-3 mb-7">
      <div class="vm-logo w-14 h-14">
        <!-- SVG ValeMove (para trocar pela PNG, veja placeholder no topo do <body>) -->
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none" aria-label="ValeMove">
          <path d="M10 14 L50 90 L90 14 L74 14 L50 62 L26 14 Z" fill="#007e7a"/>
          <path d="M58 14 L90 14 C84 32 72 40 58 30 Z" fill="#edb111"/>
          <path d="M30 22 Q38 38 46 48 Q52 54 54 68" stroke="#1cb8be" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <circle cx="30" cy="22" r="4.5" fill="#1cb8be"/>
          <circle cx="54" cy="68" r="4.5" fill="#1cb8be"/>
        </svg>
      </div>
      <div>
        <div class="text-white font-bold text-[22px] tracking-tight leading-none">ValeMove</div>
        <div class="text-[10px] font-mono text-white/45 uppercase tracking-[0.18em] mt-1">Otimização de Rotas · Vale PMad</div>
      </div>
    </div>

    <!-- Alerta login -->
    <div id="login-alert" class="hidden mb-3 p-3 rounded-lg text-[12px]"></div>

    <!-- Tabs -->
    <div class="flex gap-1 bg-white/5 rounded-lg p-1 mb-5">

/* ================================================================

const auth = {
  loginMatricula() {
    const mat = document.getElementById('inp-matricula').value.trim().toUpperCase();
    const sen = document.getElementById('inp-senha').value;
    if (!mat || !sen) return ui.loginAlert('Preencha matrícula e senha.', 'error');
    const u = DB.usuarios.find(u => u.matricula === mat && u.senha === sen);
    if (!u) return ui.loginAlert('Matrícula ou senha incorretos.', 'error');
    this.success(u);
  },

  simulateRFID() {
    const zone = document.getElementById('rfid-zone');
    zone.classList.add('reading');
    ui.loginAlert('Lendo crachá...', 'info');
    setTimeout(() => {
      zone.classList.remove('reading');
      // Seleciona aleatoriamente entre motoristas e campo (uso típico)
      const pool = DB.usuarios.filter(u => ['motorista','campo'].includes(u.cargo));
      S.rfidUser = pool[Math.floor(Math.random() * pool.length)];
      S.rfidCode = String(Math.floor(100000 + Math.random() * 900000));
      ui.loginAlert(`Crachá reconhecido: ${S.rfidUser.nome}. Código enviado por e-mail.`, 'success');
      document.getElementById('rfid-zone').style.display = 'none';
      document.getElementById('rfid-code-section').classList.remove('hidden');
      console.info('[RFID Demo] Código:', S.rfidCode);
    }, 1400);
  },

  validateRFIDCode() {
    const code = document.getElementById('inp-rfid-code').value.trim();
    if (!code || !/^\d{6}$/.test(code)) return ui.loginAlert('Informe um código de 6 dígitos.', 'error');
    if (!S.rfidUser) return ui.loginAlert('Sessão expirada. Tente novamente.', 'error');
    this.success(S.rfidUser);
  },

  quickLogin(userId) {
    const u = DB.usuarios.find(x => x.id === userId);
    if (u) this.success(u);
  },

  success(user) {
    S.user = user;
    document.getElementById('screen-login').style.display = 'none';
    document.getElementById('screen-app').classList.add('visible');
    // Preenche sidebar user
    document.getElementById('sb-user-name').textContent = user.nome;
    document.getElementById('sb-user-role').textContent = this.roleLabel(user.cargo);
    document.getElementById('sb-avatar').textContent = utils.initials(user.nome);
    document.getElementById('mobile-profile-name').textContent = user.nome;
    document.getElementById('mobile-profile-role').textContent = this.roleLabel(user.cargo);
    document.getElementById('mobile-profile-avatar').textContent = utils.initials(user.nome);
    document.getElementById('mobile-profile-toggle').textContent = utils.initials(user.nome);
    // Monta navs conforme perfil
    ui.buildNavs();
    // Inicia relógio
    utils.startClock();
    // Toast de boas-vindas
    ui.toast(`Bem-vindo ao ValeMove, ${user.nome.split(' ')[0]}!`, 'success');
    // Inicia simulação de eventos
    simulator.start();
    // Navega para a primeira seção
    const menu = MENUS[user.cargo] || [];
    if (menu[0]) ui.navigate(menu[0].id);
    lucide.createIcons();
  },

  logout() {
    S.user = null;
    S.activeSection = null;
    if (S.leafletMap) { try { S.leafletMap.remove(); } catch(e){} S.leafletMap = null; }
    operationalMaps.destroyAll();
    if (rt.map) { try { rt.map.remove(); } catch(e){} rt.map = null; }
    simulator.stop();
    document.getElementById('screen-app').classList.remove('visible');
    document.getElementById('screen-login').style.display = 'flex';
    document.getElementById('login-alert').classList.add('hidden');
    document.getElementById('rfid-zone').style.display = 'block';

    document.getElementById('mobile-profile-menu').classList.add('hidden');
    document.getElementById('mobile-profile-toggle').setAttribute('aria-expanded', 'false');
    document.getElementById('mobile-profile-toggle').textContent = '—';
    document.getElementById('mobile-profile-avatar').textContent = '—';
    document.getElementById('mobile-profile-name').textContent = '—';
    document.getElementById('mobile-profile-role').textContent = '—';
    ['inp-matricula','inp-senha','inp-rfid-code'].forEach(id => {
      const el = document.getElementById(id); if (el) el.value = '';
    });
  },

  roleLabel(cargo) {
    return ({ motorista:'MOTORISTA', campo:'FUNCIONÁRIO', despacho:'ADMINISTRAÇÃO' })[cargo] || cargo.toUpperCase();
  },
};

/* ================================================================

================================================================ */
const ui = {
  loginAlert(msg, type) {
    const el = document.getElementById('login-alert');
    el.textContent = msg;
    el.className = `mb-3 p-3 rounded-lg text-[12px] ${
      type==='error'   ? 'bg-red-500/15 border border-red-500/30 text-red-300'  :
      type==='success' ? 'bg-green-500/15 border border-green-500/30 text-green-300':
                          'bg-blue-500/15 border border-blue-500/30 text-blue-300'
    }`;
  },

  buildDemoList() {
    const el = document.getElementById('demo-list');
    const roles = { motorista:'rp-mot', campo:'rp-campo', despacho:'rp-desp' };
    const labels = { motorista:'MOTORISTA', campo:'FUNCIONÁRIO', despacho:'ADMINISTRAÇÃO' };
    el.innerHTML = DB.usuarios.map(u => `
      <button class="demo-btn" onclick="auth.quickLogin('${u.id}')">
        <span class="role-pill ${roles[u.cargo]||''}">${labels[u.cargo]||u.cargo}</span>
        <span class="flex-1">${u.nome}</span>
        <span class="font-mono text-[10px] text-white/30">${u.matricula}</span>
      </button>
    `).join('');
  },

  buildNavs() {
    const cargo = S.user.cargo;
    const menu = MENUS[cargo] || [];

    // Sidebar (desktop)
    const nav = document.getElementById('sb-nav');
    const groups = [
      { label: 'OPERAÇÃO', items: menu.filter(m => m.id !== 'proposta') },
      { label: 'SOBRE',    items: menu.filter(m => m.id === 'proposta') },
    ];
    nav.innerHTML = groups.map(g => g.items.length ? `
      <div class="text-[9px] font-bold text-white/25 uppercase tracking-[0.14em] px-3 pt-3 pb-1.5">${g.label}</div>
      ${g.items.map(item => `
        <button class="sb-nav-item" id="sb-${item.id}" onclick="ui.navigate('${item.id}')">
          <i data-lucide="${item.icon}" class="w-4 h-4"></i>
          <span>${item.label}</span>
          ${item.badge ? '<span class="ml-auto w-1.5 h-1.5 rounded-full bg-vale-yellow"></span>' : ''}
        </button>
      `).join('')}
    ` : '').join('');

    // Bottom nav (mobile) — máx. 4 itens visíveis
    const mobileItems = menu.filter(m => !m.hideMobile).slice(0, 4);
    const bn = document.getElementById('bottom-nav');
    bn.style.gridTemplateColumns = `repeat(${mobileItems.length}, 1fr)`;
    bn.innerHTML = mobileItems.map(item => `
      <button class="bn-item" id="bn-${item.id}" onclick="ui.navigate('${item.id}')">
        <i data-lucide="${item.icon}" style="width:20px;height:20px;"></i>
        <span>${item.short || item.label}</span>
      </button>
    `).join('');

    lucide.createIcons();
  },

  toggleMobileProfileMenu(event) {
    event?.stopPropagation();
    const menu = document.getElementById('mobile-profile-menu');
    const toggle = document.getElementById('mobile-profile-toggle');
    const open = menu.classList.contains('hidden');
    menu.classList.toggle('hidden', !open);
    toggle.setAttribute('aria-expanded', String(open));
  },

  closeMobileProfileMenu() {
    const menu = document.getElementById('mobile-profile-menu');
    const toggle = document.getElementById('mobile-profile-toggle');
    if (!menu || !toggle) return;
    menu.classList.add('hidden');
    toggle.setAttribute('aria-expanded', 'false');
  },

  navigate(sectionId) {
    this.closeMobileProfileMenu();
    operationalMaps.destroyAll();
    // Proposta é modal
    if (sectionId === 'proposta') return ui.openProposta();

    S.activeSection = sectionId;

    // Atualiza sidebar + bottom nav active
    document.querySelectorAll('.sb-nav-item, .bn-item').forEach(el => el.classList.remove('active'));
    const sb = document.getElementById(`sb-${sectionId}`);
    const bn = document.getElementById(`bn-${sectionId}`);
    if (sb) sb.classList.add('active');
    if (bn) bn.classList.add('active');

    // Renderiza conteúdo
    const content = document.getElementById('content');
    content.innerHTML = sections.render(sectionId);

    // Atualiza título topbar
    const menu = MENUS[S.user.cargo] || [];
    const item = menu.find(m => m.id === sectionId);
    document.getElementById('topbar-title').textContent = item?.label || '—';

    // Pós-render
    sections.afterRender(sectionId);

    // Scroll top
    content.parentElement.scrollTop = 0;

    lucide.createIcons();
  },

  toast(msg, type='info', duration=3200) {
    const container = document.getElementById('toasts');
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    const icons = { success:'check-circle', error:'x-circle', info:'info', warn:'alert-triangle' };
    el.innerHTML = `<i data-lucide="${icons[type]||'info'}" class="w-4 h-4 flex-shrink-0" style="margin-top:1px;"></i><span>${msg}</span>`;
    container.appendChild(el);
    lucide.createIcons();
    setTimeout(() => {
      el.style.transition = 'opacity .3s';
      el.style.opacity = '0';
      setTimeout(() => el.remove(), 300);
    }, duration);
  },

  openModal(html) {
    const root = document.getElementById('modal-root');
    document.getElementById('modal-content').innerHTML = html;
    root.classList.remove('hidden');
    root.classList.add('flex');
    lucide.createIcons();
  },
  closeModal() {
    const root = document.getElementById('modal-root');
    root.classList.add('hidden');
    root.classList.remove('flex');
  },

  openProposta() { ui.openModal(templates.proposta()); },

  openAlerts() {
    ui.openModal(templates.alertas());
  },
};

    const layer = svg.querySelector('#vehiclesLayer');
    if (!layer) return;

    const paths = [
      { d:'M 30 330 L 770 330', color:'#fdb913', label:'VL-01' },
      { d:'M 400 500 L 400 180', color:'#fdb913', label:'VL-03' },
      { d:'M 100 480 L 100 330 L 770 330', color:'#fdb913', label:'VL-06' },
      { d:'M 30 420 L 770 420', color:'#008f4c', label:'VL-10' },
      { d:'M 250 480 L 250 330 L 550 330 L 550 480', color:'#fdb913', label:'VL-02' },
    ];

    paths.forEach((p, i) => {
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', p.d);
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', 'none');
      svg.appendChild(path);

      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.setAttribute('filter', 'url(#pinShadow)');
      g.innerHTML = `
        <circle r="7" fill="${p.color}" stroke="#fff" stroke-width="2"/>
        <text y="-11" font-size="8" font-weight="700" fill="${p.color === '#fdb913' ? '#7a5a00' : p.color}" text-anchor="middle">${p.label}</text>
      `;
      layer.appendChild(g);

      const len = path.getTotalLength();
      let dist = Math.random() * len;
      const speed = 0.4 + Math.random() * 0.6;

      function tick() {
        if (!document.body.contains(g)) return;
        dist = (dist + speed) % len;
        const pt = path.getPointAtLength(dist);
        g.setAttribute('transform', `translate(${pt.x},${pt.y})`);
        requestAnimationFrame(tick);
      }
      tick();
    });
  },
};

  initForSection(sectionId) {
    const cfg = this.configs[sectionId];
    if (!cfg) return;
    const el = document.getElementById(cfg.containerId);
    if (!el || typeof L === 'undefined') return;

    this.destroy(sectionId);
    el.innerHTML = '';

    const map = L.map(el, {
      center: cfg.center,
      zoom: cfg.zoom,
      zoomControl: true,
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap',
      maxZoom: 19,
    }).addTo(map);

    const layerGroup = L.layerGroup().addTo(map);
    this.instances[sectionId] = map;
    this.layers[sectionId] = layerGroup;

    this.renderRoute(sectionId, cfg);
    this.renderInterdictions(sectionId, cfg);
    this.renderVehicles(sectionId, cfg);
    this.renderTeams(sectionId, cfg);

    setTimeout(() => map.invalidateSize(), 180);
  },

  destroy(sectionId) {
    const map = this.instances[sectionId];
    if (!map) return;
    try { map.remove(); } catch (e) {}
    delete this.instances[sectionId];
    delete this.layers[sectionId];
  },

  destroyAll() {
    Object.keys(this.instances).forEach((key) => this.destroy(key));
  },

  renderRoute(sectionId, cfg) {
    if (!cfg.route?.length) return;
    const coords = cfg.route.map((key) => this.points[key]).filter(Boolean);
    if (coords.length < 2) return;
    L.polyline(coords, { color: '#005c59', weight: 10, opacity: 0.18 }).addTo(this.layers[sectionId]);
    L.polyline(coords, { color: '#1cb8be', weight: 5, opacity: 0.92 }).addTo(this.layers[sectionId]);
  },

  renderInterdictions(sectionId, cfg) {
    (cfg.interdictions || []).forEach((item) => {
      const from = this.points[item.from];
      const to = this.points[item.to];
      if (!from || !to) return;
      L.polyline([from, to], { color: '#dc2626', weight: 6, opacity: 0.9, dashArray: '8 8' }).addTo(this.layers[sectionId]);
      const mid = [(from[0] + to[0]) / 2, (from[1] + to[1]) / 2];
      L.marker(mid, {
        icon: L.divIcon({
          className: '',
          html: '<div style="width:20px;height:20px;border-radius:999px;background:#dc2626;color:#fff;display:flex;align-items:center;justify-content:center;font:900 12px Inter,sans-serif;box-shadow:0 2px 8px rgba(0,0,0,.25)">!</div>',
          iconSize: [20, 20],
          iconAnchor: [10, 10],
        }),
      }).addTo(this.layers[sectionId]).bindPopup(item.label || 'Interdição');
    });
  },

  renderVehicles(sectionId, cfg) {
    (cfg.vehicles || []).forEach((item) => {
      const point = this.points[item.point];

          iconSize: [18, 18],
          iconAnchor: [9, 9],
        }),
      }).addTo(this.layers[sectionId]).bindPopup(`<b>${item.label}</b><br/>${item.popup || 'Veículo operacional'}`);
    });
  },

  renderTeams(sectionId, cfg) {
    (cfg.teams || []).forEach((item) => {
      const point = this.points[item.point];
      if (!point) return;
      L.marker(point, {
        icon: L.divIcon({

};

const formHelpers = {
  selectedCond: null,

  selectCond(cond, el) {
    this.selectedCond = cond;
    document.querySelectorAll('.tile-cond[data-cond]').forEach(e => {
      if (e.getAttribute('data-cond') === cond && !e.hasAttribute('data-prio')) {
        e.classList.add('on');
      } else if (!e.hasAttribute('data-prio')) {
        e.classList.remove('on');
      }
    });
  },

  submitRelato() {
    const via = document.getElementById('rel-via')?.value;
    const kmi = document.getElementById('rel-kmi')?.value;
    const kmf = document.getElementById('rel-kmf')?.value;
    const obs = document.getElementById('rel-obs')?.value?.trim();

    if (!via) return ui.toast('Selecione a via', 'error');
    if (!this.selectedCond) return ui.toast('Selecione a condição', 'error');

    DB.viasStatus.unshift({
      via,
      trecho: `Km ${kmi||'0,0'}–${kmf||'?'}`,
      cond: this.selectedCond,
      obs: obs || 'Sem observação',
      autor: S.user?.nome || '—',
      min: 0,
    });

    ui.toast('Relato enviado! IA aplicará ao roteamento em até 30s.', 'success');

    // Reset
    ['rel-via','rel-kmi','rel-kmf','rel-obs'].forEach(id => {
      const el = document.getElementById(id); if (el) el.value = '';
    });
    document.querySelectorAll('.tile-cond[data-cond]:not([data-prio])').forEach(e => e.classList.remove('on'));
    this.selectedCond = null;
  },
};

/* ================================================================
   LEAFLET (apenas para reportes geolocalizados)
================================================================ */
const leafletCtl = {
  init(containerId) {
    const el = document.getElementById(containerId);
    if (!el) return;
    if (typeof L === 'undefined') return;

    // Se já existe instância vinculada, invalida e retorna
    if (S.leafletMap && S.leafletMap._container === el) {
      setTimeout(() => S.leafletMap.invalidateSize(), 100);
      return;
    }
    // Remove instância antiga (outra aba)
    if (S.leafletMap) { try { S.leafletMap.remove(); } catch(e){} S.leafletMap = null; }

    const map = L.map(containerId, {
      center: [CFG.PORT_LAT, CFG.PORT_LON],
      zoom: 15,
      zoomControl: true,
    });
    S.leafletMap = map;

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap',
      maxZoom: 19,
    }).addTo(map);

    // Clique para marcar
    map.on('click', (e) => {
      const lat = parseFloat(e.latlng.lat.toFixed(6));
      const lon = parseFloat(e.latlng.lng.toFixed(6));
      S.occLat = lat;
      S.occLon = lon;
      const latEl = document.getElementById('occ-lat');
      const lonEl = document.getElementById('occ-lon');
      if (latEl) latEl.value = lat;
      if (lonEl) lonEl.value = lon;

      if (S.tempMarker) S.tempMarker.remove();
      S.tempMarker = L.marker([lat, lon], {
        icon: L.divIcon({
          className: '',
          html: '<div style="width:16px;height:16px;background:#fdb913;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.4);"></div>',
          iconSize: [16,16], iconAnchor: [8,8],
        })
      }).addTo(map).bindPopup('Nova ocorrência').openPopup();
    });

    // Renderiza ocorrências existentes
    this.refreshMarkers();

    setTimeout(() => map.invalidateSize(), 250);
  },

  refreshMarkers() {
    if (!S.leafletMap) return;
    S.leafletMarkers.forEach(m => m.remove());
    S.leafletMarkers = [];

    const cores = {
      acidente: '#dc2626',
      congestionamento: '#fdb913',
      obra: '#ea580c',
      veiculo_parado: '#10a861',
      bloqueio: '#0e1a14',
      chuva_forte: '#3b82f6',
    };
    const labels = {
      acidente: 'Acidente',
      congestionamento: 'Congestionamento',
      obra: 'Obra',
      veiculo_parado: 'Veículo parado',
      bloqueio: 'Bloqueio',
      chuva_forte: 'Chuva forte',
    };

    S.reports.forEach(o => {
      const cor = cores[o.tipo] || '#94a3b8';
      const sz  = o.gravidade === 'critica' ? 20 : o.gravidade === 'alta' ? 16 : 13;
      const mk = L.marker([o.lat, o.lon], {
        icon: L.divIcon({
          className: '',
          html: `<div style="width:${sz}px;height:${sz}px;background:${cor};border:2px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.4);"></div>`,
          iconSize: [sz,sz], iconAnchor: [sz/2, sz/2],
        })
      }).addTo(S.leafletMap).bindPopup(`
        <div style="font-family:Inter,sans-serif;">
          <div style="color:${cor};font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;">${labels[o.tipo]}</div>
          <div style="font-size:12px;color:#1a2b2a;margin-top:4px;">${o.desc}</div>
          <div style="font-size:10px;color:#94a3b8;font-family:JetBrains Mono,monospace;margin-top:4px;">Grav: ${o.gravidade} · ${new Date(o.created_at).toLocaleTimeString('pt-BR')}</div>
        </div>
      `);
      S.leafletMarkers.push(mk);
    });
  },
};

/* ================================================================
   RT — ROTEAMENTO REAL COM VALHALLA + NOMINATIM + WAZE
   - Valhalla público: https://valhalla1.openstreetmap.de/route
   - Nominatim:        https://nominatim.openstreetmap.org/search
   - Waze embed:       https://embed.waze.com/iframe
================================================================ */
const rt = {
  VALHALLA_URL: 'https://valhalla1.openstreetmap.de/route',
  NOMINATIM_URL: 'https://nominatim.openstreetmap.org/search',

  // Estado local
  map: null,
  originMarker: null,
  destMarker: null,
  routeLayer: null,
  origin: null,   // {lat, lng, label}
  dest: null,     // {lat, lng, label}
  lastClick: 'origem', // alterna origem/destino ao clicar no mapa
  acTimers: {},   // debounce do autocomplete
  bookmarks: {
    pmad: { lat: -2.5689, lng: -44.3664, zoom: 14, label: 'Porto Ponta da Madeira' },
    sp:   { lat: -23.5505, lng: -46.6333, zoom: 12, label: 'São Paulo, SP' },
  },

  /* ------------- INIT ------------- */
  initMap() {
    const container = document.getElementById('mot-map-container');
    if (!container) return;
    if (typeof L === 'undefined') {
      container.innerHTML = '<div class="p-6 text-center text-slate-500">Leaflet indisponível</div>';
      return;
    }

    // Se já havia mapa anterior, remove
    if (this.map) { try { this.map.remove(); } catch(e){} this.map = null; }
    container.innerHTML = '';

    const map = L.map(container, {
      center: [CFG.PORT_LAT, CFG.PORT_LON],
      zoom: 14,
      zoomControl: true,
    });
    this.map = map;

    // Tile OSM
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19,
    }).addTo(map);

    // Atualiza coordenadas do header ao mover
    map.on('moveend', () => {
      const c = map.getCenter();
      const el = document.getElementById('mot-coords');
      if (el) el.textContent = `Centro: ${c.lat.toFixed(4)}, ${c.lng.toFixed(4)}`;
    });

    // Clique no mapa → alterna origem / destino
    map.on('click', (e) => {
      const ll = { lat: e.latlng.lat, lng: e.latlng.lng, label: `${e.latlng.lat.toFixed(5)}, ${e.latlng.lng.toFixed(5)}` };
      if (this.lastClick === 'origem') {
        this.setPoint('origem', ll);
        this.lastClick = 'destino';
        ui.toast('Origem marcada. Clique novamente para o destino.', 'info', 2000);
      } else {
        this.setPoint('destino', ll);
        this.lastClick = 'origem';
        // Auto-calcula se temos os dois pontos
        if (this.origin && this.dest) setTimeout(() => this.calcular(), 200);
      }
    });

    // Fecha autocomplete ao clicar fora
    document.addEventListener('click', (e) => {
      if (!e.target.closest('#ac-origem') && e.target.id !== 'rt-origem') {
        document.getElementById('ac-origem')?.classList.add('hidden');
      }
      if (!e.target.closest('#ac-destino') && e.target.id !== 'rt-destino') {
        document.getElementById('ac-destino')?.classList.add('hidden');
      }
    });

    // Corrige dimensões
    setTimeout(() => map.invalidateSize(), 200);
  },

  /* ------------- POINT / MARKERS ------------- */
  setPoint(tipo, ll) {
    if (tipo === 'origem') {
      this.origin = ll;
      document.getElementById('rt-origem').value = ll.label;
      if (this.originMarker) this.originMarker.remove();
      this.originMarker = L.marker([ll.lat, ll.lng], {
        icon: this._icon('#007e7a', 'A'),
        draggable: true,
      }).addTo(this.map).bindPopup('<b>Origem</b><br/>' + ll.label);
      this.originMarker.on('dragend', (e) => {
        const p = e.target.getLatLng();
        this.origin = { lat: p.lat, lng: p.lng, label: `${p.lat.toFixed(5)}, ${p.lng.toFixed(5)}` };
        document.getElementById('rt-origem').value = this.origin.label;
        if (this.dest) this.calcular();
      });
    } else {
      this.dest = ll;
      document.getElementById('rt-destino').value = ll.label;
      if (this.destMarker) this.destMarker.remove();
      this.destMarker = L.marker([ll.lat, ll.lng], {
        icon: this._icon('#fdb913', 'B'),
        draggable: true,
      }).addTo(this.map).bindPopup('<b>Destino</b><br/>' + ll.label);
      this.destMarker.on('dragend', (e) => {
        const p = e.target.getLatLng();
        this.dest = { lat: p.lat, lng: p.lng, label: `${p.lat.toFixed(5)}, ${p.lng.toFixed(5)}` };
        document.getElementById('rt-destino').value = this.dest.label;
        this.calcular();
      });
    }
  },

  _icon(color, letter) {
    return L.divIcon({
      className: '',
      html: `<div style="background:${color};color:#fff;width:28px;height:28px;border:3px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,0.35);font-family:Inter,sans-serif;">${letter}</div>`,
      iconSize: [28,28], iconAnchor: [14,14],
    });
  },

  /* ------------- AUTOCOMPLETE (Nominatim) ------------- */
  autocomplete(field, query) {
    clearTimeout(this.acTimers[field]);
    const acBox = document.getElementById('ac-' + field);
    if (!acBox) return;

    if (!query || query.length < 3) {
      acBox.classList.add('hidden');
      return;
    }

    // Debounce 350ms (respeita Nominatim usage policy)
    this.acTimers[field] = setTimeout(async () => {
      try {
        const url = `${this.NOMINATIM_URL}?q=${encodeURIComponent(query)}&format=json&limit=5&addressdetails=1&countrycodes=br`;
        const resp = await fetch(url, {
          headers: { 'Accept-Language': 'pt-BR' }
        });
        if (!resp.ok) throw new Error('Nominatim HTTP ' + resp.status);
        const results = await resp.json();

        if (!results.length) {
          acBox.innerHTML = '<div class="px-3 py-2 text-[12px] text-slate-400">Nenhum resultado</div>';
          acBox.classList.remove('hidden');
          return;
        }

        acBox.innerHTML = results.map((r, i) => {
          const name = r.display_name;
          const shortName = name.length > 80 ? name.slice(0, 80) + '…' : name;
          // Escape para onclick (aspas simples dentro)
          const safeName = name.replace(/'/g, "\\'");
          return `
            <button class="w-full text-left px-3 py-2 hover:bg-vale-slate text-[12px] border-b border-vale-border last:border-0"
                    onclick="rt.pickSuggestion('${field}', ${r.lat}, ${r.lon}, '${safeName}')">
              <div class="font-semibold truncate">${r.name || shortName.split(',')[0]}</div>
              <div class="text-[11px] text-slate-500 truncate">${shortName}</div>
            </button>
          `;
        }).join('');
        acBox.classList.remove('hidden');
      } catch(e) {
        console.warn('[Nominatim]', e.message);
        acBox.classList.add('hidden');
      }
    }, 350);
  },

  pickSuggestion(field, lat, lon, name) {
    const ll = { lat: parseFloat(lat), lng: parseFloat(lon), label: name };
    this.setPoint(field, ll);
    document.getElementById('ac-' + field).classList.add('hidden');
    // Centraliza no ponto
    if (this.map) this.map.setView([ll.lat, ll.lng], 15);
  },

  /* ------------- CÁLCULO DE ROTA (Valhalla) ------------- */
  async calcular() {
    if (!this.origin || !this.dest) {
      return ui.toast('Defina origem e destino', 'error');
    }

    ui.toast('Calculando rota com Valhalla...', 'info', 1800);

    const body = {
      locations: [
        { lat: this.origin.lat, lon: this.origin.lng, type: 'break' },
        { lat: this.dest.lat,   lon: this.dest.lng,   type: 'break' },
      ],
      costing: 'auto',
      directions_options: { units: 'kilometers', language: 'pt-BR' },
      format: 'json',
    };

    try {
      const url = `${this.VALHALLA_URL}?json=${encodeURIComponent(JSON.stringify(body))}`;
      const resp = await fetch(url);
      if (!resp.ok) throw new Error('Valhalla HTTP ' + resp.status);
      const data = await resp.json();

      if (!data.trip || !data.trip.legs?.length) throw new Error('Rota não encontrada');

      const trip = data.trip;
      const leg = trip.legs[0];
      const shape = leg.shape;

      // Decodifica polyline (precisão 6)
      const coords = this._decodePolyline(shape, 6);

      // Desenha rota
      if (this.routeLayer) this.routeLayer.remove();
      this.routeLayer = L.polyline(coords, {
        color: '#007e7a',
        weight: 6,
        opacity: 0.85,
        lineJoin: 'round',
      }).addTo(this.map);

      // Borda mais clara por baixo (efeito casing)
      this.routeLayer = L.layerGroup([
        L.polyline(coords, { color: '#005c59', weight: 10, opacity: 0.35, lineJoin: 'round' }),
        L.polyline(coords, { color: '#1cb8be', weight: 5, opacity: 0.95, lineJoin: 'round' }),
      ]).addTo(this.map);

      // Ajusta viewport para caber a rota
      const bounds = L.latLngBounds(coords);
      this.map.fitBounds(bounds, { padding: [50, 50] });

      // Métricas
      const km  = trip.summary.length.toFixed(1);
      const min = Math.round(trip.summary.time / 60);
      document.getElementById('rt-dist').textContent = km + ' km';
      document.getElementById('rt-time').textContent = min + ' min';
      document.getElementById('route-info-bar').classList.remove('hidden');

      // Turn-by-turn
      this._renderManeuvers(leg.maneuvers || []);

      ui.toast(`Rota calculada: ${km} km · ~${min} min`, 'success');

    } catch(e) {
      console.error('[Valhalla]', e);
      ui.toast('Erro ao calcular rota: ' + e.message, 'error');
    }
  },

  /* ------------- DECODIFICADOR DE POLYLINE (Valhalla usa precisão 6) ------------- */
  _decodePolyline(str, precision = 6) {
    let index = 0, lat = 0, lng = 0;
    const coords = [];
    const factor = Math.pow(10, precision);
    while (index < str.length) {
      let byte, shift = 0, result = 0;
      do { byte = str.charCodeAt(index++) - 63; result |= (byte & 0x1f) << shift; shift += 5; } while (byte >= 0x20);
      const dlat = (result & 1) ? ~(result >> 1) : (result >> 1);
      lat += dlat;
      shift = 0; result = 0;
      do { byte = str.charCodeAt(index++) - 63; result |= (byte & 0x1f) << shift; shift += 5; } while (byte >= 0x20);
      const dlng = (result & 1) ? ~(result >> 1) : (result >> 1);
      lng += dlng;
      coords.push([lat / factor, lng / factor]);
    }
    return coords;
  },

  /* ------------- TURN-BY-TURN ------------- */
  _renderManeuvers(maneuvers) {
    const card = document.getElementById('rt-instr-card');
    const list = document.getElementById('rt-instr-list');
    const count = document.getElementById('rt-instr-count');
    if (!list || !maneuvers.length) { if (card) card.style.display = 'none'; return; }

    const iconMap = {
      1: 'arrow-up',       // start
      4: 'flag',           // destination
      5: 'arrow-up',       // continue
      6: 'arrow-up',       // continue
      9: 'corner-up-right',// turn slight right
      10:'corner-up-right',// turn right
      11:'corner-down-right',// turn sharp right
      15:'corner-up-left', // turn slight left
      14:'corner-up-left', // turn left
      13:'corner-down-left',
      16:'rotate-ccw',     // u-turn
      26:'circle',         // roundabout
      27:'circle',         // roundabout exit
    };

    list.innerHTML = maneuvers.slice(0, 10).map((m, i) => {
      const icon = iconMap[m.type] || 'arrow-up';
      const dist = m.length != null ? (m.length < 1 ? Math.round(m.length*1000) + ' m' : m.length.toFixed(1) + ' km') : '';
      const isEnd = i === maneuvers.length - 1;
      const isStart = i === 0;
      return `
        <div class="flex items-center gap-3 py-3 ${isStart ? 'bg-vale-green-bg -mx-4 px-4 border-l-[3px] border-vale-green' : ''}">
          <div class="w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0 ${
            isStart ? 'bg-vale-green text-white' :
            isEnd   ? 'bg-vale-yellow text-vale-ink' :
                      'bg-vale-slate text-slate-500'
          }">
            <i data-lucide="${isEnd ? 'flag' : icon}" class="w-4 h-4"></i>
          </div>
          <div class="flex-1 min-w-0">
            <div class="text-sm font-semibold">${m.instruction || 'Continuar'}</div>
            ${dist ? `<div class="text-[11px] text-slate-500 font-mono">${dist}</div>` : ''}
          </div>
        </div>
      `;
    }).join('');

    count.textContent = maneuvers.length + ' manobras';
    card.style.display = '';
    lucide.createIcons();
  },

  /* ------------- BOOKMARKS ------------- */
  bookmark(key) {
    const b = this.bookmarks[key];
    if (!b || !this.map) return;
    this.map.setView([b.lat, b.lng], b.zoom);
    ui.toast(`Centralizado: ${b.label}`, 'info', 1600);
  },

  useCurrentLocation() {
    if (!navigator.geolocation) return ui.toast('Geolocation indisponível', 'error');
    ui.toast('Obtendo localização...', 'info', 1500);
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const ll = { lat: pos.coords.latitude, lng: pos.coords.longitude, label: 'Minha localização' };
        this.setPoint('origem', ll);
        this.map.setView([ll.lat, ll.lng], 15);
        this.lastClick = 'destino';
        ui.toast('Localização marcada como origem', 'success');
      },
      (err) => ui.toast('Erro GPS: ' + err.message, 'error'),
      { enableHighAccuracy: true, timeout: 10000 }
    );
  },

  /* ------------- LIMPAR ------------- */
  clear() {
    if (this.originMarker) { this.originMarker.remove(); this.originMarker = null; }
    if (this.destMarker)   { this.destMarker.remove();   this.destMarker = null;   }
    if (this.routeLayer)   { this.routeLayer.remove();   this.routeLayer = null;   }
    this.origin = null; this.dest = null; this.lastClick = 'origem';
    document.getElementById('rt-origem').value = '';
    document.getElementById('rt-destino').value = '';
    document.getElementById('route-info-bar')?.classList.add('hidden');
    const card = document.getElementById('rt-instr-card');
    if (card) card.style.display = 'none';
    ui.toast('Rota limpa', 'info', 1500);
  },

  /* ------------- WAZE EMBED ------------- */
  openWaze(lat, lng) {
    let centerLat = lat, centerLng = lng;
    if (centerLat == null) {
      if (this.map) {
        const c = this.map.getCenter();
        centerLat = c.lat; centerLng = c.lng;
      } else {
        centerLat = CFG.PORT_LAT; centerLng = CFG.PORT_LON;
      }
    }
    const html = `
      <div class="px-5 py-4 border-b border-vale-border flex items-center gap-2 sticky top-0 bg-white z-10">
        <i data-lucide="traffic-cone" class="w-5 h-5 text-vale-yellow-dk"></i>
        <div class="font-bold">Trânsito ao vivo · Waze</div>
        <span class="chip bd-info ml-2 font-mono text-[10px]">
          ${centerLat.toFixed(4)}, ${centerLng.toFixed(4)}
        </span>
        <button onclick="ui.closeModal()" class="ml-auto p-1.5 hover:bg-vale-slate rounded-lg">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>
      <div class="p-0" style="height: 70vh;">
        <iframe
          src="https://embed.waze.com/iframe?zoom=14&lat=${centerLat}&lon=${centerLng}&pin=1"
          style="width:100%;height:100%;border:none;display:block;"
          allowfullscreen loading="lazy">
        </iframe>
      </div>
      <div class="border-t border-vale-border px-5 py-3 bg-vale-slate text-[11px] text-slate-500">
        <i data-lucide="info" class="inline w-3 h-3"></i>
        Dados de trânsito fornecidos pelo Waze Live Map.
      </div>
    `;
    ui.openModal(html);
  },

  openWazeCurrent() {
    // Abre Waze com o centro da rota atual
    if (this.origin && this.dest) {
      const midLat = (this.origin.lat + this.dest.lat) / 2;
      const midLng = (this.origin.lng + this.dest.lng) / 2;
      this.openWaze(midLat, midLng);
    } else {
      this.openWaze();
    }
  },
};

/* ================================================================
   SIMULADOR DE EVENTOS AO VIVO
================================================================ */
const simulator = {
  interval: null,

  start() {
    this.renderInitial();
    this.interval = setInterval(() => {
      const e = DB.poolEventos[Math.floor(Math.random() * DB.poolEventos.length)];
      DB.eventos.unshift({ t: 0, ...e });
      if (DB.eventos.length > 14) DB.eventos.pop();
      this.renderAll();

      // KPIs sutis
      const tma = (3.8 + Math.random() * 0.8).toFixed(1);
      const opt = 89 + Math.floor(Math.random() * 6);
      const kTma = document.getElementById('kpi-tma');
      const kOpt = document.getElementById('kpi-opt');
      if (kTma) kTma.textContent = tma;
      if (kOpt) kOpt.textContent = opt + '%';
    }, 5000);
  },

  stop() {
    if (this.interval) { clearInterval(this.interval); this.interval = null; }
  },

  renderInitial() { this.renderAll(); },

  renderAll() {
    const containers = ['motEventLog','dspEventLog'];
    const html = DB.eventos.slice(0,8).map(e => `
      <div class="flex items-start gap-2 py-1.5 border-b border-vale-border last:border-0">
        <i data-lucide="${e.icon}" class="w-3.5 h-3.5 mt-0.5 ${e.color}"></i>
        <div class="flex-1">
          <div class="text-[10px] text-slate-400 font-mono tabular-nums">${utils.agoMin(e.t)}</div>
          <div class="text-[12px] text-slate-700">${e.msg}</div>
        </div>
      </div>
    `).join('');
    containers.forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.innerHTML = html; }
    });
    lucide.createIcons();
  },
};

/* ================================================================
   UTILITÁRIOS
================================================================ */
const utils = {
  clockInterval: null,

  startClock() {
    if (this.clockInterval) clearInterval(this.clockInterval);
    const tick = () => {
      const el = document.getElementById('topbar-clock');
      if (el) el.textContent = new Date().toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
    };
    tick();
    this.clockInterval = setInterval(tick, 30000);
  },

  initials(name) {
    return (name || '').split(' ').map(p => p[0] || '').slice(0,2).join('').toUpperCase() || 'U';
  },

  agoMin(min) {
    if (min < 1) return 'agora';
    if (min < 60) return `${min} min atrás`;
    if (min < 1440) return `${Math.floor(min/60)}h atrás`;
    return `${Math.floor(min/1440)}d atrás`;
  },

  addMinutes(min) {
    const d = new Date(Date.now() + min * 60000);
    return d.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
  },

  filterVias(cond, btnEl) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btnEl.classList.add('active');
    const list = cond === 'todos' ? DB.viasStatus : DB.viasStatus.filter(v => v.cond === cond);
    const container = document.getElementById('via-historico-list');
    if (container) {
      container.innerHTML = list.length ? list.map(v => sections._viaItem(v)).join('') :
        '<div class="p-6 text-center text-slate-400 text-sm">Nenhum registro</div>';
      lucide.createIcons();
    }
  },
};

function switchLoginTab(tab) {
  document.getElementById('tab-senha').classList.toggle('active', tab==='senha');
  document.getElementById('tab-rfid').classList.toggle('active',  tab==='rfid');
  document.getElementById('method-senha').classList.toggle('hidden', tab!=='senha');
  document.getElementById('method-rfid').classList.toggle('hidden',  tab!=='rfid');
}

document.addEventListener('DOMContentLoaded', () => {
  // Build demo users
  ui.buildDemoList();
  // Render lucide icons
  lucide.createIcons();
  document.addEventListener('click', (event) => {
    const wrap = event.target.closest('.mobile-profile');
    if (!wrap) ui.closeMobileProfileMenu();
  });

  // Detecta mobile e prioriza RFID
  const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);
  if (isMobile) switchLoginTab('rfid');
});
